version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "primary"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"
      - "automated"

    versioning-strategy: increase

  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "primary"

    schedule:
      interval: "daily"

    labels:
      - "security"
