version: 2
updates:
  - package-ecosystem: "npm"       # Node.js / NPM dependencies
    directory: "/"                 # Root of your repository
    target-branch: "primary"       # Branch you develop on
    schedule:
      interval: "weekly"           # Checks for updates once a week
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5    # Max simultaneous PRs from Dependabot
    commit-message:
      prefix: "deps"               # Prefix for automatic commit messages
    labels:
      - "dependencies"
      - "automated"
    allow:
      - dependency-type: "all"     # Includes security and regular updates
